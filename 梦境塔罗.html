<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>星空塔罗 · 疗愈工坊</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }

        body {
            min-height: 100vh;
            background: #0b0715;
            position: relative;
            overflow-x: hidden;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        /* 动态深紫色星空背景 */
        .cosmic-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: radial-gradient(ellipse at 40% 45%, #2a1845, #0e0820, #03010a);
        }

        .nebula {
            position: absolute;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(120, 60, 200, 0.25) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(70, 20, 140, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 50% 90%, rgba(180, 100, 255, 0.15) 0%, transparent 45%);
            filter: blur(40px);
            animation: nebulaDrift 20s infinite alternate ease-in-out;
        }

        @keyframes nebulaDrift {
            0% { transform: scale(1) translate(0, 0); opacity: 0.8; }
            100% { transform: scale(1.1) translate(-2%, -1%); opacity: 1; }
        }

        .galaxy-spin {
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background: radial-gradient(circle at 30% 40%, rgba(150, 80, 220, 0.12) 0%, transparent 50%);
            animation: slowSpin 60s linear infinite;
            pointer-events: none;
        }

        @keyframes slowSpin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s infinite alternate;
        }

        @keyframes twinkle {
            0% { opacity: 0.2; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.3); }
        }

        .shooting-star {
            position: absolute;
            width: 2px;
            height: 80px;
            background: linear-gradient(to bottom, #fff, rgba(255,255,255,0));
            opacity: 0;
            transform: rotate(25deg);
            box-shadow: 0 0 10px #bb9eff;
            animation: shoot 8s linear infinite;
        }

        @keyframes shoot {
            0% { opacity: 0; top: -10%; left: 120%; }
            5% { opacity: 1; }
            15% { opacity: 0; top: 80%; left: -20%; }
            100% { opacity: 0; top: -10%; left: 120%; }
        }

        /* 主卡片 */
        .main-card {
            position: relative;
            z-index: 10;
            max-width: 1200px;
            width: 100%;
            background: rgba(20, 10, 40, 0.45);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(200, 150, 255, 0.25);
            border-radius: 42px;
            padding: 30px 28px;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(180, 130, 255, 0.1) inset;
            margin-bottom: 30px;
        }

        .header-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }

        h1 {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 400;
            font-size: 2.2rem;
            letter-spacing: 4px;
            color: #f3e3ff;
            text-shadow: 0 0 15px #b77eff, 0 0 30px #6a2be2;
        }

        .header-actions {
            display: flex;
            gap: 15px;
        }

        .cart-btn, .history-btn {
            background: rgba(70, 30, 120, 0.5);
            border: 1px solid #9f7aeb;
            color: #e0ceff;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            cursor: pointer;
            backdrop-filter: blur(4px);
            transition: 0.2s;
            box-shadow: 0 0 12px #7a4bc2;
            position: relative;
        }

        .cart-btn:hover, .history-btn:hover {
            background: #7b4ab0;
            color: white;
            border-color: #d7b9ff;
        }

        .cart-count {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #d9b3ff;
            color: #1e0f30;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .subtitle {
            color: #cbb2ff;
            margin-bottom: 28px;
            font-size: 1rem;
            border-left: 3px solid #b77eff;
            padding-left: 18px;
            font-style: italic;
            text-shadow: 0 0 8px #3e1f7a;
        }

        .tarot-section {
            background: rgba(44, 22, 66, 0.4);
            border-radius: 32px;
            padding: 24px;
            margin-bottom: 30px;
            border: 1px solid #a571e055;
        }

        .section-title {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #dac0ff;
            margin-bottom: 18px;
            font-size: 1.3rem;
        }

        .question-area {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .input-group {
            display: flex;
            gap: 12px;
            align-items: center;
            background: rgba(0, 0, 0, 0.25);
            border-radius: 60px;
            padding: 5px 5px 5px 25px;
            border: 1px solid rgba(210, 170, 255, 0.3);
            backdrop-filter: blur(5px);
        }

        .input-group i {
            color: #c9a9ff;
            font-size: 1.3rem;
        }

        #dreamInput {
            flex: 1;
            background: transparent;
            border: none;
            padding: 16px 8px;
            font-size: 1.1rem;
            color: #f0e6ff;
            outline: none;
        }

        #dreamInput::placeholder {
            color: #9f84c9;
            font-weight: 300;
        }

        #searchBtn {
            background: linear-gradient(145deg, #7d3fc2, #4a1d8c);
            border: none;
            color: white;
            padding: 14px 30px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            box-shadow: 0 6px 18px #3a1e6e, 0 0 0 1px #b77eff inset;
            transition: 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.2);
            letter-spacing: 2px;
        }

        #searchBtn:hover {
            background: linear-gradient(145deg, #9350e0, #5e28a8);
            box-shadow: 0 6px 22px #7a4bc2;
            transform: scale(1.02);
        }

        .quick-questions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
            justify-content: center;
        }

        .quick-btn {
            background: rgba(70, 30, 120, 0.5);
            border: 1px solid #9f7aeb;
            color: #e0ceff;
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 0.9rem;
            backdrop-filter: blur(4px);
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 2px 8px #00000033;
            white-space: nowrap;
        }

        .quick-btn:hover {
            background: #7b4ab0;
            color: white;
            border-color: #d7b9ff;
            box-shadow: 0 0 12px #b27afe;
        }

        .cards-section {
            margin: 25px 0 20px;
        }

        .cards-title {
            display: flex;
            align-items: baseline;
            gap: 12px;
            color: #dac0ff;
            margin-bottom: 20px;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .cards-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px 30px;
            margin-bottom: 30px;
        }

        .card-item {
            flex: 0 1 180px;
            min-width: 140px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(44, 22, 66, 0.5);
            padding: 20px 8px 15px;
            border-radius: 28px;
            backdrop-filter: blur(8px);
            border: 1px solid #a571e0;
            box-shadow: 0 10px 20px -5px #00000055, 0 0 18px #7850b0 inset;
        }

        .card-visual {
            font-size: 4.5rem;
            filter: drop-shadow(0 0 12px #d6b0ff);
        }

        .card-name {
            font-weight: bold;
            color: #f3e3ff;
            font-size: 1.2rem;
            text-align: center;
        }

        .card-position {
            color: #bc9eff;
            font-size: 0.8rem;
            margin-top: 5px;
            text-transform: uppercase;
        }

        .interpretation-box {
            background: rgba(18, 8, 33, 0.65);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 28px;
            border: 1px solid #af8cf5;
            box-shadow: 0 0 30px #1e0f30 inset, 0 8px 18px #0000004d;
            margin: 20px 0 25px;
            line-height: 1.8;
        }

        .ai-badge {
            display: inline-block;
            background: #9f6eff33;
            border-radius: 30px;
            padding: 6px 18px;
            color: #cfb5ff;
            font-size: 0.9rem;
            border: 1px dashed #b185ff;
            margin-bottom: 18px;
        }

        .interpretation-text {
            color: #e9dbff;
            font-size: 1.05rem;
            white-space: pre-wrap;
        }

        .recommend-section {
            margin-top: 20px;
            padding: 20px;
            background: rgba(70, 30, 120, 0.2);
            border-radius: 28px;
            border: 1px dashed #b27afe;
        }

        .recommend-title {
            color: #dac0ff;
            margin-bottom: 16px;
            font-size: 1.1rem;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 16px;
        }

        .product-card {
            background: rgba(30, 15, 50, 0.6);
            border-radius: 20px;
            padding: 15px;
            border: 1px solid #a571e0;
            backdrop-filter: blur(4px);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            transition: 0.2s;
        }

        .product-card:hover {
            transform: translateY(-3px);
            border-color: #d9b3ff;
            box-shadow: 0 0 20px #9f6eff55;
        }

        .product-emoji {
            font-size: 3rem;
            margin-bottom: 8px;
        }

        .product-name {
            color: #f0e6ff;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .product-desc {
            color: #bc9eff;
            font-size: 0.8rem;
            margin-bottom: 10px;
        }

        .product-price {
            color: #ffd966;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .add-to-cart {
            background: #7d3fc2;
            border: none;
            color: white;
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 0.8rem;
            cursor: pointer;
            border: 1px solid #b77eff;
            width: 100%;
        }

        .shop-section {
            margin-top: 30px;
        }

        .search-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        #productSearchInput {
            flex: 1;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid #9f7aeb;
            border-radius: 40px;
            padding: 14px 20px;
            color: white;
            font-size: 1rem;
        }

        #productSearchBtn {
            background: #6d3eb0;
            border: none;
            border-radius: 40px;
            padding: 0 24px;
            color: white;
            cursor: pointer;
            border: 1px solid #b27afe;
        }

        .filter-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
        }

        .filter-tag {
            background: rgba(70, 30, 120, 0.4);
            border: 1px solid #9f7aeb;
            color: #dac0ff;
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 0.8rem;
            cursor: pointer;
        }

        .filter-tag.active {
            background: #9f6eff;
            color: white;
        }

        .cart-drawer, .history-drawer {
            position: fixed;
            top: 0;
            right: -400px;
            width: 100%;
            max-width: 380px;
            height: 100vh;
            background: rgba(20, 10, 40, 0.9);
            backdrop-filter: blur(20px);
            border-left: 1px solid #a571e0;
            box-shadow: -10px 0 40px #00000080;
            z-index: 1000;
            transition: right 0.3s ease;
            padding: 24px 20px;
            overflow-y: auto;
            color: #f0e6ff;
        }

        .cart-drawer.open, .history-drawer.open {
            right: 0;
        }

        .drawer-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            border-bottom: 1px solid #9f7aeb;
            padding-bottom: 15px;
        }

        .drawer-header h3 {
            font-weight: 400;
            letter-spacing: 3px;
            color: #dac0ff;
        }

        .close-drawer {
            background: none;
            border: none;
            color: #bc9eff;
            font-size: 1.8rem;
            cursor: pointer;
        }

        .cart-items {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .cart-item {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(44, 22, 66, 0.5);
            padding: 12px;
            border-radius: 20px;
            border: 1px solid #b27afe55;
        }

        .cart-item-emoji {
            font-size: 2rem;
        }

        .cart-item-info {
            flex: 1;
        }

        .cart-item-name {
            color: #f0e6ff;
        }

        .cart-item-price {
            color: #ffd966;
            font-size: 0.9rem;
        }

        .cart-item-remove {
            color: #f4a2a2;
            cursor: pointer;
        }

        .cart-total {
            margin-top: 24px;
            text-align: right;
            font-size: 1.2rem;
            border-top: 1px solid #9f7aeb;
            padding-top: 16px;
        }

        .checkout-btn {
            background: linear-gradient(145deg, #7d3fc2, #4a1d8c);
            border: none;
            color: white;
            padding: 14px;
            border-radius: 40px;
            width: 100%;
            margin-top: 16px;
            font-size: 1.1rem;
            cursor: pointer;
        }

        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #00000080;
            z-index: 999;
            opacity: 0;
            visibility: hidden;
            transition: 0.2s;
        }
        .overlay.show {
            opacity: 1;
            visibility: visible;
        }

        .footer-note {
            margin-top: 20px;
            font-size: 0.8rem;
            color: #7760a0;
            text-align: right;
        }

        @media (max-width: 600px) {
            .main-card { padding: 20px 15px; }
            h1 { font-size: 1.6rem; }
        }

        .loading-spin {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #ccaaff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="cosmic-bg"></div>
    <div class="nebula"></div>
    <div class="galaxy-spin"></div>
    <div class="stars" id="starsContainer"></div>
    <div class="shooting-star" style="top: 15%; left: 80%; animation-delay: 2s;"></div>
    <div class="shooting-star" style="top: 40%; left: 110%; animation-delay: 6s; width: 1px; height: 60px;"></div>

    <div class="overlay" id="overlay"></div>
    <div class="cart-drawer" id="cartDrawer">
        <div class="drawer-header">
            <h3><i class="fas fa-shopping-cart"></i> 购物车</h3>
            <button class="close-drawer" id="closeCartBtn">&times;</button>
        </div>
        <div id="cartItemsContainer" class="cart-items"></div>
        <div class="cart-total" id="cartTotal">合计: ¥0</div>
        <button class="checkout-btn" id="checkoutBtn">✨ 去结算</button>
    </div>

    <div class="history-drawer" id="historyDrawer">
        <div class="drawer-header">
            <h3><i class="fas fa-history"></i> 占卜记录</h3>
            <button class="close-drawer" id="closeHistoryBtn">&times;</button>
        </div>
        <div id="historyListContainer" class="cart-items"></div>
        <button class="checkout-btn" id="clearHistoryBtn" style="margin-top:20px;">清空记录</button>
    </div>

    <div class="main-card">
        <div class="header-row">
            <h1>
                <i class="fas fa-moon"></i> 
                星空塔罗·疗愈工坊
                <i class="fas fa-star"></i>
            </h1>
            <div class="header-actions">
                <div class="history-btn" id="openHistoryBtn">
                    <i class="fas fa-history"></i>
                </div>
                <div class="cart-btn" id="openCartBtn">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="cart-count" id="cartCount">0</span>
                </div>
            </div>
        </div>
        <div class="subtitle">
            ✦ 倾听潜意识 · 遇见专属能量石 ✦
        </div>

        <div class="tarot-section">
            <div class="section-title">
                <i class="fas fa-crystal-ball"></i> 免费梦境塔罗
            </div>
            <div class="question-area">
                <div class="input-group">
                    <i class="fas fa-cloud-moon"></i>
                    <input type="text" id="dreamInput" placeholder="描述你的梦境或想问的问题……" autocomplete="off">
                </div>
                <button id="searchBtn"><i class="fas fa-hand-sparkles"></i> 抽取三张牌 · 解梦</button>
            </div>
            <div class="quick-questions">
                <div class="quick-btn" data-question="梦见考试迟到，大脑一片空白">📚 考试迟到</div>
                <div class="quick-btn" data-question="梦见自己在天空飞翔，俯瞰城市">🕊️ 飞翔</div>
                <div class="quick-btn" data-question="梦见掉牙齿，满嘴是血">🦷 掉牙</div>
                <div class="quick-btn" data-question="梦见被追赶，却跑不动">🏃 被追赶</div>
                <div class="quick-btn" data-question="梦见喜欢的人，但我们没说话">💕 暗恋</div>
            </div>

            <div id="tarotResultArea" style="display: none;">
                <div class="cards-container" id="cardsContainer"></div>
                <div class="interpretation-box">
                    <div class="ai-badge"><i class="fas fa-crystal"></i> 塔罗梦境深度解析</div>
                    <div class="interpretation-text" id="interpretationText"></div>
                </div>
                <div class="recommend-section" id="recommendProducts"></div>
            </div>
        </div>

        <div class="shop-section">
            <div class="section-title">
                <i class="fas fa-gem"></i> 能量疗愈商店
            </div>
            <div class="search-bar">
                <input type="text" id="productSearchInput" placeholder="搜索水晶、风铃、羽毛...">
                <button id="productSearchBtn"><i class="fas fa-search"></i></button>
            </div>
            <div class="filter-tags" id="filterTags">
                <span class="filter-tag active" data-tag="all">全部</span>
                <span class="filter-tag" data-tag="水晶">🔮 水晶</span>
                <span class="filter-tag" data-tag="风铃">🎐 风铃</span>
                <span class="filter-tag" data-tag="羽毛">🪶 羽毛</span>
                <span class="filter-tag" data-tag="草药">🌿 草药</span>
            </div>
            <div class="product-grid" id="productGrid"></div>
        </div>

        <div class="footer-note">
            <i class="fas fa-meteor"></i> 每件物品都承载着宇宙的祝福
        </div>
    </div>

    <script>
        (function(){
            function generateStars(c=150) {
                const container = document.getElementById('starsContainer');
                for (let i=0;i<c;i++) {
                    const star = document.createElement('div'); star.className='star';
                    const s=Math.random()*3+1.2; star.style.width=s+'px'; star.style.height=s+'px';
                    star.style.left=Math.random()*100+'%'; star.style.top=Math.random()*100+'%';
                    star.style.animationDelay=Math.random()*5+'s';
                    container.appendChild(star);
                }
            }
            generateStars(160);

            const products = [
                { id:1, name:'紫水晶手链', emoji:'🔮', category:'水晶', price:128, tags:['焦虑','失眠','月亮','压力'], desc:'天然紫水晶8mm，安神助眠' },
                { id:2, name:'白水晶灵摆', emoji:'⚪', category:'水晶', price:89, tags:['净化','专注','清晰'], desc:'通透白水晶，提升直觉力' },
                { id:3, name:'粉晶爱心吊坠', emoji:'💗', category:'水晶', price:68, tags:['爱情','恋人','桃花'], desc:'招桃花增强人缘' },
                { id:4, name:'黑曜石手链', emoji:'🖤', category:'水晶', price:138, tags:['保护','高塔','负能量','辟邪'], desc:'强力守护，抵御负能量' },
                { id:5, name:'黄水晶貔貅', emoji:'🟡', category:'水晶', price:198, tags:['财运','自信','太阳'], desc:'招财聚气，增强自信' },
                { id:6, name:'月光石吊坠', emoji:'🌙', category:'水晶', price:158, tags:['情感','隐士','疗愈','直觉'], desc:'安抚情绪，连接月亮能量' },
                { id:7, name:'捕梦网风铃', emoji:'🎐', category:'风铃', price:78, tags:['梦境','净化','安眠'], desc:'过滤噩梦，只留美梦' },
                { id:8, name:'七脉轮风铃', emoji:'🌈', category:'风铃', price:98, tags:['平衡','能量','疗愈'], desc:'七色对应脉轮' },
                { id:9, name:'天然羽毛摆件', emoji:'🪶', category:'羽毛', price:45, tags:['自由','飞翔','轻盈'], desc:'天然鹅毛，象征自由' },
                { id:10, name:'白鼠尾草棒', emoji:'🌿', category:'草药', price:38, tags:['净化','高塔','驱邪'], desc:'加州白鼠尾，能量净化' },
                { id:11, name:'圣木条', emoji:'🪵', category:'草药', price:58, tags:['净化','疗愈','平静'], desc:'秘鲁圣木，带来平静' },
                { id:12, name:'海蓝宝原石', emoji:'💎', category:'水晶', price:218, tags:['沟通','表达','冷静'], desc:'增强表达，舒缓焦虑' }
            ];

            const tarotDeck = [
                { name:'愚者', emoji:'🧙', meaning:'全新的开始、无畏的冒险精神，但也可能暗示鲁莽。', bias:1, tags:['自由','冒险'], fullMeaning:'正位：新旅程、自由、天真。逆位：冲动、不计后果、缺乏计划。' },
                { name:'魔术师', emoji:'🪄', meaning:'创造力、技巧与资源的整合，你有能力将想法化为现实。', bias:1, tags:['专注','自信'], fullMeaning:'正位：创造力、自信、技巧纯熟。逆位：能力被滥用、欺骗、缺乏行动。' },
                { name:'女祭司', emoji:'🌙', meaning:'直觉、神秘与潜意识，答案藏在内心深处。', bias:0, tags:['直觉','月亮'], fullMeaning:'正位：直觉敏锐、神秘、倾听内心。逆位：忽视直觉、表面化、情绪混乱。' },
                { name:'皇后', emoji:'👑', meaning:'丰盛、滋养与创造力，近期会收获情感或物质上的满足。', bias:1, tags:['爱情','丰盛'], fullMeaning:'正位：丰收、母爱、感官享受。逆位：依赖、创造力受阻、情绪不安。' },
                { name:'皇帝', emoji:'🏛️', meaning:'权威、结构与稳定，需要建立秩序，掌控自己的生活节奏。', bias:0, tags:['稳定','秩序'], fullMeaning:'正位：领导力、纪律、父亲形象。逆位：专制、缺乏自律、失控。' },
                { name:'教皇', emoji:'📜', meaning:'传统、学习与精神指引，或许该寻求导师或遵循规则。', bias:0, tags:['智慧'], fullMeaning:'正位：遵循传统、精神成长、贵人相助。逆位：挑战权威、非正统、盲目崇拜。' },
                { name:'恋人', emoji:'💞', meaning:'关系、选择与结合，梦境反映你对重要决定或情感的思考。', bias:1, tags:['爱情','桃花'], fullMeaning:'正位：爱情、和谐、选择。逆位：分离、对立、犹豫不决。' },
                { name:'战车', emoji:'🏎️', meaning:'意志力、胜利与前进，你正克服困难，勇往直前。', bias:1, tags:['行动','自信'], fullMeaning:'正位：胜利、意志力、掌控方向。逆位：失控、失败、缺乏方向。' },
                { name:'力量', emoji:'🦁', meaning:'勇气、耐心与内在力量，用柔和的方式驯服内心野兽。', bias:1, tags:['勇气','自信'], fullMeaning:'正位：内在力量、耐心、以柔克刚。逆位：软弱、恐惧、缺乏自信。' },
                { name:'隐士', emoji:'🏮', meaning:'内省、孤独与寻求真理，梦境建议你暂时退一步思考。', bias:-1, tags:['疗愈','孤独'], fullMeaning:'正位：内省、寻求指引、独处。逆位：孤立、逃避、拒绝建议。' },
                { name:'命运之轮', emoji:'🎡', meaning:'转变、机遇与命运，生活即将迎来转折，顺势而为。', bias:1, tags:['转变'], fullMeaning:'正位：幸运、转折点、顺应变化。逆位：厄运、抗拒改变、停滞。' },
                { name:'正义', emoji:'⚖️', meaning:'公平、真相与因果，你在寻求平衡，或某个决定将尘埃落定。', bias:0, tags:['平衡'], fullMeaning:'正位：公正、诚实、因果报应。逆位：不公、逃避责任、偏见。' },
                { name:'倒吊人', emoji:'🙃', meaning:'牺牲、换个视角与等待，有时停下是为了更好地出发。', bias:-1, tags:['等待'], fullMeaning:'正位：牺牲、换个角度、等待。逆位：无谓牺牲、僵化、错失良机。' },
                { name:'死神', emoji:'💀', meaning:'结束、转变与重生，一个阶段的终结是新生必然的序章。', bias:-1, tags:['转变','净化'], fullMeaning:'正位：结束、重生、放下。逆位：抗拒改变、停滞不前、恐惧终结。' },
                { name:'节制', emoji:'🌊', meaning:'平衡、调和与耐心，避免极端，寻找中庸之道。', bias:1, tags:['平衡','疗愈'], fullMeaning:'正位：适度、调和、耐心。逆位：失衡、过度、缺乏协调。' },
                { name:'恶魔', emoji:'😈', meaning:'束缚、物质主义与阴影，你是否困在某种执念或习惯中？', bias:-1, tags:['束缚','保护'], fullMeaning:'正位：执念、物欲、束缚。逆位：挣脱、觉醒、摆脱控制。' },
                { name:'高塔', emoji:'🗼', meaning:'突变、颠覆与觉醒，旧有结构崩塌，但真相会带来自由。', bias:-1, tags:['保护','辟邪','净化'], fullMeaning:'正位：剧变、崩塌、觉醒。逆位：恐惧改变、勉强维持、灾难延迟。' },
                { name:'星星', emoji:'✨', meaning:'希望、疗愈与灵感，即使身处黑暗，也要相信光芒。', bias:1, tags:['希望','疗愈'], fullMeaning:'正位：希望、信心、疗愈。逆位：绝望、缺乏信心、灵感枯竭。' },
                { name:'月亮', emoji:'🌕', meaning:'幻觉、恐惧与潜意识，梦境模糊，但请直面深层不安。', bias:-1, tags:['焦虑','失眠','月亮'], fullMeaning:'正位：潜意识、恐惧、幻觉。逆位：揭示真相、摆脱恐惧、清晰。' },
                { name:'太阳', emoji:'☀️', meaning:'快乐、成功与活力，一切明朗，正能量满满。', bias:1, tags:['自信','活力'], fullMeaning:'正位：快乐、成功、活力。逆位：暂时阴霾、缺乏热情、延迟成功。' },
                { name:'审判', emoji:'📯', meaning:'觉醒、重生与召唤，你正收到内心的呼唤，做出改变。', bias:1, tags:['觉醒'], fullMeaning:'正位：觉醒、重生、召唤。逆位：抗拒觉醒、犹豫、自我怀疑。' },
                { name:'世界', emoji:'🌍', meaning:'完成、整合与旅程，一个周期的圆满结束，值得庆祝。', bias:1, tags:['圆满'], fullMeaning:'正位：完成、圆满、整合。逆位：未完成、缺失、封闭。' }
            ];

            let currentCards = null;
            let currentQuestion = '';
            let cart = JSON.parse(localStorage.getItem('tarot_cart')) || [];
            let history = JSON.parse(localStorage.getItem('tarot_history')) || [];
            let currentFilter = 'all';
            let searchKeyword = '';

            function updateCartUI() {
                document.getElementById('cartCount').textContent = cart.length;
                const container = document.getElementById('cartItemsContainer');
                if (cart.length===0) container.innerHTML='<div style="color:#aa92cf;padding:20px;text-align:center;">🛒 购物车空空如也</div>';
                else {
                    let html=''; let total=0;
                    cart.forEach((item,idx)=>{
                        total+=item.price;
                        html+=`<div class="cart-item"><span class="cart-item-emoji">${item.emoji}</span><div class="cart-item-info"><div class="cart-item-name">${item.name}</div><div class="cart-item-price">¥${item.price}</div></div><span class="cart-item-remove" data-index="${idx}"><i class="fas fa-trash"></i></span></div>`;
                    });
                    container.innerHTML=html;
                    document.getElementById('cartTotal').innerHTML=`合计: ¥${total}`;
                    document.querySelectorAll('.cart-item-remove').forEach(btn=>btn.addEventListener('click',e=>{
                        const i=e.currentTarget.dataset.index; cart.splice(i,1); saveCart(); updateCartUI();
                    }));
                }
                localStorage.setItem('tarot_cart',JSON.stringify(cart));
            }
            function saveCart(){ localStorage.setItem('tarot_cart',JSON.stringify(cart)); }
            function addToCart(product){
                cart.push(product); saveCart(); updateCartUI();
                alert(`✨ 已将 ${product.name} 加入购物车`);
            }

            function renderProducts(filter='all', keyword=''){
                const grid=document.getElementById('productGrid');
                let filtered=products.filter(p=> (filter==='all' || p.category===filter) && (keyword==='' || p.name.includes(keyword) || p.desc.includes(keyword) || p.tags.some(t=>t.includes(keyword))));
                if(filtered.length===0){ grid.innerHTML='<div style="color:#aa92cf;grid-column:1/-1;text-align:center;padding:30px;">🔍 没有找到相关商品</div>'; return; }
                let html='';
                filtered.forEach(p=>{
                    html+=`<div class="product-card"><div class="product-emoji">${p.emoji}</div><div class="product-name">${p.name}</div><div class="product-desc">${p.desc}</div><div class="product-price">¥${p.price}</div><button class="add-to-cart" data-id="${p.id}">🛒 加入购物车</button></div>`;
                });
                grid.innerHTML=html;
                document.querySelectorAll('.add-to-cart').forEach(btn=>btn.addEventListener('click',e=>{
                    const id=parseInt(e.currentTarget.dataset.id); const prod=products.find(p=>p.id===id); addToCart(prod);
                }));
            }

            function getRecommendedProducts(cards){
                let allTags=[]; cards.forEach(c=>{ if(c.tags) allTags.push(...c.tags); });
                const scored=products.map(p=>{ let score=0; p.tags.forEach(t=>{ if(allTags.includes(t)) score+=2; }); return {...p, score}; });
                return scored.filter(p=>p.score>0).sort((a,b)=>b.score-a.score).slice(0,3);
            }

            function renderRecommendations(cards){
                const recs=getRecommendedProducts(cards);
                const container=document.getElementById('recommendProducts');
                if(recs.length===0){ container.innerHTML=''; return; }
                let html=`<div class="recommend-title"><i class="fas fa-magic"></i> 根据你的能量，为你推荐：</div><div class="product-grid">`;
                recs.forEach(p=>{ html+=`<div class="product-card"><div class="product-emoji">${p.emoji}</div><div class="product-name">${p.name}</div><div class="product-desc">${p.desc}</div><div class="product-price">¥${p.price}</div><button class="add-to-cart" data-id="${p.id}">🛒 加入购物车</button></div>`; });
                html+='</div>'; container.innerHTML=html;
                document.querySelectorAll('.add-to-cart').forEach(btn=>btn.addEventListener('click',e=>{ const id=parseInt(e.currentTarget.dataset.id); addToCart(products.find(p=>p.id===id)); }));
            }

            function drawThreeCards(){
                const shuffled=[...tarotDeck].sort(()=>Math.random()-0.5);
                return shuffled.slice(0,3).map(c=>({...c, reversed:Math.random()>0.5, displayName:Math.random()>0.5?c.name+' (逆位)':c.name, orientation:Math.random()>0.5?'逆位':'正位'}));
            }

            function generateInterpretation(dream, cards){
                const dreamLower = dream.toLowerCase();
                let dreamSpecific = '';
                if (dreamLower.includes('考试')||dreamLower.includes('挂科')) dreamSpecific = '考试梦常映射现实压力与对评价的焦虑。';
                else if (dreamLower.includes('飞')||dreamLower.includes('翅膀')) dreamSpecific = '飞翔象征对自由的渴望与超越现实的冲动。';
                else if (dreamLower.includes('牙')||dreamLower.includes('齿')) dreamSpecific = '掉牙梦常与自信动摇、表达受阻或对衰老的潜意识担忧有关。';
                else if (dreamLower.includes('追')||dreamLower.includes('跑')) dreamSpecific = '被追赶的梦往往反映现实中的逃避心态或未解决的压力源。';
                else if (dreamLower.includes('喜欢')||dreamLower.includes('爱')) dreamSpecific = '情感类梦境揭示了你对关系的渴望或对自我价值的探寻。';
                else dreamSpecific = '这个梦境是你潜意识的独特语言。';

                let interpretation = `🌙 梦境解析 · 「${dream.slice(0,35)}${dream.length>35?'…':''}」\n`;
                interpretation += `📖 ${dreamSpecific}\n\n`;
                
                const positions = ['过去的影响', '当下的核心', '未来的指引'];
                cards.forEach((card, idx) => {
                    const reversedText = card.reversed ? '逆位' : '正位';
                    const full = card.fullMeaning || `${reversedText}含义：${card.meaning}`;
                    interpretation += `🃏 ${positions[idx]} · ${card.displayName}\n`;
                    interpretation += `   ${full}\n`;
                    // 针对梦境关键词微调
                    if (dreamLower.includes('考试') && card.name==='隐士') interpretation += `   💡 隐士提醒你：暂时从外界评价中抽离，专注内在积累。\n`;
                    if (dreamLower.includes('飞') && card.name==='星星') interpretation += `   💡 星星与飞翔共鸣：你正在接近理想中的自由状态。\n`;
                    if (dreamLower.includes('牙') && card.name==='力量') interpretation += `   💡 力量牌告诉你：真正的自信源于接纳脆弱，而非完美。\n`;
                    interpretation += `\n`;
                });
                
                const biasSum = cards.reduce((s,c)=>s+(c.reversed?-c.bias:c.bias),0);
                const overall = biasSum>0 ? '整体能量偏向积极，宇宙正以温柔的方式推动你前行。' : (biasSum<0 ? '整体能量偏向警示，但这些挑战都是成长的契机。' : '能量趋于平衡，你正处在重要的过渡阶段。');
                interpretation += `🌟 综合启示：${overall}`;
                return interpretation;
            }

            function handleDraw(questionText=null){
                const dream=questionText||document.getElementById('dreamInput').value.trim()||'未解之谜';
                currentQuestion=dream;
                document.getElementById('searchBtn').disabled=true;
                setTimeout(()=>{
                    const cards=drawThreeCards(); currentCards=cards;
                    document.getElementById('cardsContainer').innerHTML=cards.map((c,i)=>`<div class="card-item"><div class="card-visual">${c.emoji}</div><div class="card-name">${c.displayName}</div><div class="card-position">${['过去','现在','未来'][i]} · ${c.orientation}</div></div>`).join('');
                    document.getElementById('interpretationText').innerText=generateInterpretation(dream,cards);
                    document.getElementById('tarotResultArea').style.display='block';
                    renderRecommendations(cards);
                    const biasSum=cards.reduce((s,c)=>s+(c.reversed?-c.bias:c.bias),0);
                    const bias=biasSum>0?'正向':(biasSum<0?'负向':'中性');
                    history.unshift({question:dream,cards:cards.map(c=>({emoji:c.emoji,name:c.displayName})),bias,time:new Date().toLocaleString()});
                    if(history.length>5) history.pop();
                    localStorage.setItem('tarot_history',JSON.stringify(history));
                    document.getElementById('searchBtn').disabled=false;
                },600);
            }

            function renderHistory(){
                const c=document.getElementById('historyListContainer');
                if(!history.length) c.innerHTML='<div style="color:#aa92cf;padding:20px;">暂无记录</div>';
                else{
                    let h='';
                    history.forEach(r=>{ h+=`<div style="background:rgba(44,22,66,0.5);padding:12px;border-radius:16px;margin-bottom:10px;"><div style="display:flex;justify-content:space-between;"><span>“${r.question.slice(0,20)}…”</span><span style="color:${r.bias==='正向'?'#a5e6b0':(r.bias==='负向'?'#f4a2a2':'#d4c2ff')}">${r.bias}</span></div><div style="font-size:1.8rem;">${r.cards.map(c=>c.emoji).join(' ')}</div></div>`; });
                    c.innerHTML=h;
                }
            }

            document.getElementById('searchBtn').addEventListener('click',()=>handleDraw());
            document.querySelectorAll('.quick-btn').forEach(b=>b.addEventListener('click',e=>handleDraw(e.currentTarget.dataset.question)));
            document.getElementById('productSearchBtn').addEventListener('click',()=>{ searchKeyword=document.getElementById('productSearchInput').value; renderProducts(currentFilter,searchKeyword); });
            document.querySelectorAll('.filter-tag').forEach(t=>t.addEventListener('click',e=>{
                document.querySelectorAll('.filter-tag').forEach(tt=>tt.classList.remove('active')); e.currentTarget.classList.add('active');
                currentFilter=e.currentTarget.dataset.tag; renderProducts(currentFilter,searchKeyword);
            }));

            const overlay=document.getElementById('overlay');
            const cartDrawer=document.getElementById('cartDrawer'), histDrawer=document.getElementById('historyDrawer');
            function openDrawer(d){ d.classList.add('open'); overlay.classList.add('show'); }
            function closeAll(){ cartDrawer.classList.remove('open'); histDrawer.classList.remove('open'); overlay.classList.remove('show'); }
            document.getElementById('openCartBtn').addEventListener('click',()=>{ openDrawer(cartDrawer); updateCartUI(); });
            document.getElementById('openHistoryBtn').addEventListener('click',()=>{ openDrawer(histDrawer); renderHistory(); });
            document.getElementById('closeCartBtn').addEventListener('click',closeAll);
            document.getElementById('closeHistoryBtn').addEventListener('click',closeAll);
            overlay.addEventListener('click',closeAll);
            document.getElementById('clearHistoryBtn').addEventListener('click',()=>{ history=[]; localStorage.removeItem('tarot_history'); renderHistory(); });
            document.getElementById('checkoutBtn').addEventListener('click',()=>{ if(cart.length) alert('✨ 感谢购买！愿宇宙能量伴你左右。(演示模式)'); else alert('购物车是空的'); });

            renderProducts();
            updateCartUI();
        })();
    </script>
</body>
</html>
